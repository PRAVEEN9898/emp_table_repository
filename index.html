<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Data</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-color: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 8px 16px;
      margin-bottom: 20px;
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #0052a3;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
    }

    th {
      background-color: #0066cc;
      color: white;
      padding: 10px;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background-color: #f0f0f0;
    }

    #status {
      margin-bottom: 10px;
      color: gray;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <h1>Employee Data</h1>

  <button onclick="loadData()">Reload</button>

  <p id="status">Loading...</p>

  <table>
    <thead>
      <tr>
        <th>Emp No</th>
        <th>Name</th>
        <th>Job</th>
        <th>Manager</th>
        <th>Hire Date</th>
        <th>Salary</th>
        <th>Commission</th>
        <th>Dept No</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    function loadData() {
      document.getElementById('status').innerText = 'Loading...';
      document.getElementById('tableBody').innerHTML = '';

      fetch('https://oracleapex.com/ords/praveen_9898/EMP_MODULE/get_employee_data')
        .then(function(response) { return response.json(); })
        .then(function(data) {
          var rows = '';
          data.items.forEach(function(emp) {
            rows += '<tr>' +
              '<td>' + emp.empno + '</td>' +
              '<td>' + emp.ename + '</td>' +
              '<td>' + emp.job + '</td>' +
              '<td>' + (emp.mgr || '-') + '</td>' +
              '<td>' + emp.hiredate.substring(0, 10) + '</td>' +
              '<td>' + emp.sal + '</td>' +
              '<td>' + (emp.comm !== null ? emp.comm : '-') + '</td>' +
              '<td>' + emp.deptno + '</td>' +
            '</tr>';
          });
          document.getElementById('tableBody').innerHTML = rows;
          document.getElementById('status').innerText = 'Total Records: ' + data.items.length;
        })
        .catch(function(error) {
          document.getElementById('status').innerText = 'Error loading data: ' + error.message;
        });
    }

    loadData();
  </script>

</body>
</html>
